spring.application.name=Event Booking App

# ============================================================
# DataSource – MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/event_booking_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=28072003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# JWT Configuration
# ============================================================
# Secret key >= 256-bit (32 chars) – thay bằng key mạnh hơn khi deploy
app.jwt.secret=EventBookingAppSecretKey2025SuperSecure!
# Token expiry: 24 hours = 86400000 ms
app.jwt.expiration-ms=86400000

# ============================================================
# Server
# ============================================================
server.port=8080
